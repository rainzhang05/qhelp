name: Test Clipboard

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test-clipboard:
    runs-on: macos-26
    steps:
      - uses: actions/checkout@v4
      - name: Build
        run: swift build -c release
      - name: Run ClipboardContentTests
        run: swift run -c release ClipAITests ClipboardContentTests
