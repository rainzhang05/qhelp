name: Test Queue

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test-queue:
    runs-on: macos-26
    steps:
      - uses: actions/checkout@v4
      - name: Build
        run: swift build -c release
      - name: Run RequestQueueTests
        run: swift run -c release ClipAITests RequestQueueTests
